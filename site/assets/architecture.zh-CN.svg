<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Domaeng 本地优先架构</title>
  <desc id="desc">Domaeng Web 通过加密 relay 传输连接到 Mac 上的 bridge，bridge 再连接 Codex app-server 和本地 Codex 会话文件。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbf7"/>
      <stop offset="0.56" stop-color="#eef6f3"/>
      <stop offset="1" stop-color="#edf4f8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#edf5f2" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17342b" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#176c4f"/>
    </marker>
  </defs>
  <style>
    .label { fill: #0f1f19; font: 700 25px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; }
    .body { fill: #56635d; font: 600 18px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; }
    .meta { fill: #176c4f; font: 760 17px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif; }
    .arrow { stroke: #176c4f; stroke-width: 3.5; stroke-linecap: round; marker-end: url(#arrow); }
    .arrow-both { marker-end: url(#arrow); }
  </style>
  <rect width="720" height="900" rx="34" fill="url(#bg)"/>
  <rect x="26" y="24" width="668" height="852" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.74"/>

  <text x="72" y="62" fill="#0b1713" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif" font-size="30" font-weight="800">Domaeng 架构</text>
  <text x="72" y="92" fill="#5d6a64" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif" font-size="18" font-weight="620">本地 runtime、配对浏览器控制、自托管传输层。</text>

  <g filter="url(#shadow)">
    <rect x="72" y="120" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
    <rect x="72" y="252" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
    <rect x="72" y="384" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
    <rect x="72" y="516" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
    <rect x="72" y="648" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
    <rect x="72" y="780" width="576" height="88" rx="24" fill="url(#card)" stroke="#ffffff"/>
  </g>

  <circle cx="112" cy="164" r="14" fill="#73d69a"/>
  <text class="label" x="144" y="157">Domaeng Web App</text>
  <text class="body" x="144" y="184">手机或浏览器里的主要控制界面。</text>

  <line class="arrow arrow-both" x1="360" y1="218" x2="360" y2="244"/>
  <text class="meta" x="390" y="236">端到端加密 WebSocket 会话</text>

  <circle cx="112" cy="296" r="14" fill="#8fc8f0"/>
  <text class="label" x="144" y="289">Relay 传输层</text>
  <text class="body" x="144" y="316">本地或自托管；只转发加密后的 payload。</text>

  <line class="arrow arrow-both" x1="360" y1="350" x2="360" y2="376"/>
  <text class="meta" x="390" y="368">会话发现与转发</text>

  <circle cx="112" cy="428" r="14" fill="#73d69a"/>
  <text class="label" x="144" y="421">Mac 上的 domaeng bridge</text>
  <text class="body" x="144" y="448">本地 daemon、配对信任、git/workspace RPC。</text>

  <line class="arrow arrow-both" x1="360" y1="482" x2="360" y2="508"/>
  <text class="meta" x="390" y="500">stdin/stdout 或 localhost JSON-RPC</text>

  <circle cx="112" cy="560" r="14" fill="#f0bd67"/>
  <text class="label" x="144" y="553">codex app-server</text>
  <text class="body" x="144" y="580">bridge 使用的 Codex runtime 接口。</text>

  <line class="arrow" x1="360" y1="614" x2="360" y2="640"/>
  <text class="meta" x="390" y="632">写入 JSONL rollout</text>

  <circle cx="112" cy="692" r="14" fill="#b8c3bd"/>
  <text class="label" x="144" y="685">~/.codex/sessions</text>
  <text class="body" x="144" y="712">Mac 本地磁盘上的线程历史。</text>

  <line class="arrow" x1="360" y1="746" x2="360" y2="772"/>
  <text class="meta" x="390" y="764">导航时从磁盘读取</text>

  <circle cx="112" cy="824" r="14" fill="#6f9cf6"/>
  <text class="label" x="144" y="817">Codex.app desktop</text>
  <text class="body" x="144" y="844">读取历史；可选 AppleScript 刷新跳转。</text>
</svg>
